<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Particle Heart</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <canvas id="heartCanvas"></canvas>
    <div class="ui">
      <button id="toggleBtn">Pause</button>
      <label>Particles: <input id="countRange" type="range" min="200" max="3000" value="1200"></label>
      <label>Size: <input id="sizeRange" type="range" min="0.5" max="5" step="0.1" value="1.6"></label>
      <label>Color: <input id="colorPicker" type="color" value="#ff80b3"></label>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
